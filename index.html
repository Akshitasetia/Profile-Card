<!DOCTYPE html>
<html>
<head>

  <title>PROFILE CARD</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    body{
      display: flex;
      justify-content: center;
      align-items: center;

      height: 100vh;

      background: linear-gradient(135deg,#f8dff1,#f3c4e5);

      font-family: "Poppins", sans-serif;
    }

    .Box{
      width: 300px;

      background-color: white;

      border-radius: 20px;

      text-align: center;

      overflow: hidden;

      box-shadow: 0 8px 20px rgba(0,0,0,0.15);

      transition: all 0.4s ease;
    }

    .Box:hover{
      transform: translateY(-10px);

      box-shadow:
      0 20px 40px rgba(223,14,157,0.25),
      0 10px 20px rgba(0,0,0,0.15);
    }

    .top{
      height: 110px;

      background: #a3175d;

      display: flex;
      justify-content: center;
      align-items: flex-end;
    }

    .photo{
      width: 85px;
      height: 85px;

      border-radius: 50%;

      object-fit: cover;

      border: 4px solid white;

      transform: translateY(40px);
    }

    .content{
      padding: 50px 20px 30px;
    }

    .name{
      font-size: 22px;

      font-weight: 600;

      color: #222;

      margin-bottom: 6px;
    }

    .bio{
      font-size: 14px;

      color: #666;

      margin-bottom: 22px;

      line-height: 1.5;
    }

    .icons{
      display: flex;

      justify-content: center;

      gap: 15px;

      margin-bottom: 25px;
    }

    .icon{
      width: 20px;
      height: 20px;

      cursor: pointer;

      transition: transform 0.2s;
    }

    .icon:hover{
      transform: scale(1.2);
    }

    .buttons{
      display: flex;

      justify-content: center;

      gap: 10px;
    }

    .follow{
      width: 90px;
      height: 35px;

      background-color: rgb(223, 14, 157);

      color: white;

      border: none;

      border-radius: 18px;

      cursor: pointer;

      font-weight: bold;

      transition: 0.2s ease;
    }

    .message{
      width: 90px;
      height: 35px;

      background-color: white;

      color: rgb(223, 14, 157);

      border: 2px solid rgb(223, 14, 157);

      border-radius: 18px;

      cursor: pointer;

      font-weight: bold;

      transition: 0.2s ease;
    }

    .follow:hover{
      background-color: rgb(190, 10, 130);

      transform: scale(1.05);
    }

    .message:hover{
      background-color: rgb(223, 14, 157);

      color: white;

      transform: scale(1.05);
    }

  </style>

</head>

<body>

  <div class="Box">

    <div class="top">

      <img class="photo" src="profilecard.jpeg">

    </div>

    <div class="content">

      <p class="name">Akshita Setia</p>

      <p class="bio">
        CS student | building ideas into interfaces
      </p>

      <div class="icons">

        <a href="https://www.linkedin.com/in/akshitasetia/" target="_blank">

          <img class="icon"
          src="https://cdn-icons-png.flaticon.com/512/174/174857.png">

        </a>

        <a href="https://github.com/Akshitasetia" target="_blank">

          <img class="icon"
          src="https://cdn-icons-png.flaticon.com/512/733/733553.png">

        </a>

      </div>

      <div class="buttons">

        <button class="follow">Follow</button>

        <button class="message">Message</button>

      </div>

    </div>

  </div>

</body>

</html>
